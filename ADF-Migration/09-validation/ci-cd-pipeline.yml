# =============================================================================
# Brightfield Retail Group: CI/CD Pipeline
# SSIS-to-ADF Migration — ARM Template Validation & Deployment
# =============================================================================

name: ADF-CI-CD

on:
  push:
    branches:
      - main
      - 'release/*'
    paths:
      - 'ADF-Migration/**'
  pull_request:
    branches:
      - main
    paths:
      - 'ADF-Migration/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  RESOURCE_GROUP_DEV: rg-bfretail-dev
  RESOURCE_GROUP_STAGING: rg-bfretail-staging
  RESOURCE_GROUP_PROD: rg-bfretail-prod
  ADF_NAME_DEV: adf-bfretail-dev
  ADF_NAME_STAGING: adf-bfretail-staging
  ADF_NAME_PROD: adf-bfretail-prod
  ARM_TEMPLATE_PATH: ADF-Migration
  AZURE_REGION: eastus2

jobs:
  # ===========================================================================
  # Stage 1: Validate ARM/Bicep Templates
  # ===========================================================================
  validate:
    name: Validate ARM Templates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate Bicep syntax
        run: |
          echo "=== Validating Bicep templates ==="
          az bicep build --file ADF-Migration/02-infrastructure/main.bicep
          echo "✅ Bicep compilation successful"

      - name: Validate infrastructure deployment (what-if)
        run: |
          az deployment group what-if \
            --resource-group ${{ env.RESOURCE_GROUP_DEV }} \
            --template-file ADF-Migration/02-infrastructure/main.bicep \
            --parameters environment=dev prefix=bfretail \
            --no-pretty-print

      - name: Validate ADF pipeline JSON schemas
        run: |
          echo "=== Validating ADF pipeline JSON files ==="
          ERRORS=0

          for file in $(find ADF-Migration -name "pipeline-*.json" -o -name "dataflow-*.json" -o -name "ls-*.json" -o -name "ds-*.json" -o -name "trigger-*.json"); do
            echo "Validating: $file"
            if ! python3 -c "import json; json.load(open('$file'))"; then
              echo "❌ Invalid JSON: $file"
              ERRORS=$((ERRORS + 1))
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            echo "❌ $ERRORS JSON validation errors found"
            exit 1
          fi
          echo "✅ All ADF JSON files are valid"

      - name: Validate pipeline structure
        run: |
          echo "=== Checking ADF pipeline structure ==="
          python3 << 'EOF'
          import json, glob, sys

          errors = []
          pipelines = glob.glob("ADF-Migration/**/pipeline-*.json", recursive=True)

          for path in pipelines:
              with open(path) as f:
                  try:
                      data = json.load(f)
                  except json.JSONDecodeError as e:
                      errors.append(f"{path}: JSON parse error: {e}")
                      continue

              name = data.get("name", "")
              props = data.get("properties", {})

              if not name:
                  errors.append(f"{path}: Missing 'name' field")
              if not props.get("activities"):
                  errors.append(f"{path}: No activities defined")

              # Check activity dependency references are valid
              activity_names = {a["name"] for a in props.get("activities", [])}
              for activity in props.get("activities", []):
                  for dep in activity.get("dependsOn", []):
                      if dep.get("activity") not in activity_names:
                          errors.append(
                              f"{path}: Activity '{activity['name']}' depends on "
                              f"unknown activity '{dep.get('activity')}'"
                          )

          if errors:
              print("❌ Pipeline structure errors:")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)

          print(f"✅ Validated {len(pipelines)} pipeline(s) — all structures valid")
          EOF

      - name: Validate SQL scripts syntax
        run: |
          echo "=== Checking SQL files for common syntax issues ==="
          ERRORS=0
          for file in $(find ADF-Migration -name "*.sql"); do
            echo "Checking: $file"
            # Ensure files are non-empty and have valid UTF-8 encoding
            if [ ! -s "$file" ]; then
              echo "❌ Empty SQL file: $file"
              ERRORS=$((ERRORS + 1))
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            echo "❌ $ERRORS SQL validation issues found"
            exit 1
          fi
          echo "✅ All SQL files passed basic validation"

  # ===========================================================================
  # Stage 2: Deploy to Dev
  # ===========================================================================
  deploy-dev:
    name: Deploy to Dev
    needs: validate
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: https://adf.azure.com/en/home?factory=%2Fsubscriptions%2F${{ secrets.AZURE_SUBSCRIPTION_ID }}%2FresourceGroups%2Frg-bfretail-dev%2Fproviders%2FMicrosoft.DataFactory%2Ffactories%2Fadf-bfretail-dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy infrastructure (Bicep)
        run: |
          az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP_DEV }} \
            --template-file ADF-Migration/02-infrastructure/main.bicep \
            --parameters environment=dev prefix=bfretail \
            --name "adf-infra-dev-${{ github.run_number }}"

      - name: Stop ADF triggers before deployment
        run: |
          echo "=== Stopping active triggers ==="
          TRIGGERS=$(az datafactory trigger list \
            --resource-group ${{ env.RESOURCE_GROUP_DEV }} \
            --factory-name ${{ env.ADF_NAME_DEV }} \
            --query "[?properties.runtimeState=='Started'].name" \
            --output tsv 2>/dev/null || true)

          for trigger in $TRIGGERS; do
            echo "Stopping trigger: $trigger"
            az datafactory trigger stop \
              --resource-group ${{ env.RESOURCE_GROUP_DEV }} \
              --factory-name ${{ env.ADF_NAME_DEV }} \
              --name "$trigger" || true
          done

      - name: Deploy ADF linked services
        run: |
          for file in ADF-Migration/03-extract-pipelines/linked-services/ls-*.json; do
            NAME=$(python3 -c "import json; print(json.load(open('$file'))['name'])")
            echo "Deploying linked service: $NAME"
            az datafactory linked-service create \
              --resource-group ${{ env.RESOURCE_GROUP_DEV }} \
              --factory-name ${{ env.ADF_NAME_DEV }} \
              --name "$NAME" \
              --properties @"$file"
          done

      - name: Deploy ADF datasets
        run: |
          for file in ADF-Migration/03-extract-pipelines/datasets/ds-*.json; do
            NAME=$(python3 -c "import json; print(json.load(open('$file'))['name'])")
            echo "Deploying dataset: $NAME"
            az datafactory dataset create \
              --resource-group ${{ env.RESOURCE_GROUP_DEV }} \
              --factory-name ${{ env.ADF_NAME_DEV }} \
              --name "$NAME" \
              --properties @"$file"
          done

      - name: Deploy ADF dataflows
        run: |
          for file in ADF-Migration/04-transform-dataflows/dataflow-*.json; do
            NAME=$(python3 -c "import json; print(json.load(open('$file'))['name'])")
            echo "Deploying dataflow: $NAME"
            az datafactory data-flow create \
              --resource-group ${{ env.RESOURCE_GROUP_DEV }} \
              --factory-name ${{ env.ADF_NAME_DEV }} \
              --name "$NAME" \
              --flow-type "MappingDataFlow" \
              --properties @"$file"
          done

      - name: Deploy ADF pipelines
        run: |
          # Deploy in dependency order: extract → transform → orchestrator → validation
          for dir in 03-extract-pipelines/pipelines 07-incremental-loads 06-orchestration 09-validation; do
            for file in ADF-Migration/$dir/pipeline-*.json; do
              [ -f "$file" ] || continue
              NAME=$(python3 -c "import json; print(json.load(open('$file'))['name'])")
              echo "Deploying pipeline: $NAME"
              az datafactory pipeline create \
                --resource-group ${{ env.RESOURCE_GROUP_DEV }} \
                --factory-name ${{ env.ADF_NAME_DEV }} \
                --name "$NAME" \
                --pipeline @"$file"
            done
          done

      - name: Deploy ADF triggers
        run: |
          for file in ADF-Migration/06-orchestration/trigger-*.json; do
            NAME=$(python3 -c "import json; print(json.load(open('$file'))['name'])")
            echo "Deploying trigger: $NAME"
            az datafactory trigger create \
              --resource-group ${{ env.RESOURCE_GROUP_DEV }} \
              --factory-name ${{ env.ADF_NAME_DEV }} \
              --name "$NAME" \
              --properties @"$file"
          done

      - name: Start ADF triggers
        run: |
          echo "=== Starting triggers ==="
          TRIGGERS=$(az datafactory trigger list \
            --resource-group ${{ env.RESOURCE_GROUP_DEV }} \
            --factory-name ${{ env.ADF_NAME_DEV }} \
            --query "[?properties.runtimeState=='Stopped'].name" \
            --output tsv 2>/dev/null || true)

          for trigger in $TRIGGERS; do
            echo "Starting trigger: $trigger"
            az datafactory trigger start \
              --resource-group ${{ env.RESOURCE_GROUP_DEV }} \
              --factory-name ${{ env.ADF_NAME_DEV }} \
              --name "$trigger" || true
          done

      - name: Run database migration scripts
        run: |
          echo "=== Applying watermark and audit schema ==="
          az sql db execute \
            --resource-group ${{ env.RESOURCE_GROUP_DEV }} \
            --server "sql-bfretail-dev" \
            --name "BrightfieldDW" \
            --query "$(cat ADF-Migration/07-incremental-loads/watermark-setup.sql)" \
            2>/dev/null || echo "⚠️ SQL script execution skipped (server may not be available)"

  # ===========================================================================
  # Stage 3: Run Validation in Dev
  # ===========================================================================
  validate-dev:
    name: Validate Dev Deployment
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify ADF resources deployed
        run: |
          echo "=== Verifying ADF resources ==="

          echo "--- Linked Services ---"
          az datafactory linked-service list \
            --resource-group ${{ env.RESOURCE_GROUP_DEV }} \
            --factory-name ${{ env.ADF_NAME_DEV }} \
            --query "[].name" --output tsv

          echo "--- Datasets ---"
          az datafactory dataset list \
            --resource-group ${{ env.RESOURCE_GROUP_DEV }} \
            --factory-name ${{ env.ADF_NAME_DEV }} \
            --query "[].name" --output tsv

          echo "--- Pipelines ---"
          az datafactory pipeline list \
            --resource-group ${{ env.RESOURCE_GROUP_DEV }} \
            --factory-name ${{ env.ADF_NAME_DEV }} \
            --query "[].name" --output tsv

          echo "--- Triggers ---"
          az datafactory trigger list \
            --resource-group ${{ env.RESOURCE_GROUP_DEV }} \
            --factory-name ${{ env.ADF_NAME_DEV }} \
            --query "[].{name:name, state:properties.runtimeState}" --output table

      - name: Trigger validation pipeline
        run: |
          echo "=== Running validation pipeline ==="
          RUN_ID=$(az datafactory pipeline create-run \
            --resource-group ${{ env.RESOURCE_GROUP_DEV }} \
            --factory-name ${{ env.ADF_NAME_DEV }} \
            --name "pipeline_validation" \
            --query "runId" --output tsv)

          echo "Pipeline run ID: $RUN_ID"
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

          # Poll for completion (max 30 minutes)
          for i in $(seq 1 60); do
            STATUS=$(az datafactory pipeline-run show \
              --resource-group ${{ env.RESOURCE_GROUP_DEV }} \
              --factory-name ${{ env.ADF_NAME_DEV }} \
              --run-id "$RUN_ID" \
              --query "status" --output tsv)

            echo "Attempt $i/60 — Status: $STATUS"

            if [ "$STATUS" = "Succeeded" ]; then
              echo "✅ Validation pipeline passed"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "❌ Validation pipeline $STATUS"
              az datafactory activity-run query-by-pipeline-run \
                --resource-group ${{ env.RESOURCE_GROUP_DEV }} \
                --factory-name ${{ env.ADF_NAME_DEV }} \
                --run-id "$RUN_ID" \
                --last-updated-after "2020-01-01T00:00:00Z" \
                --last-updated-before "2099-12-31T00:00:00Z" \
                --query "value[?status=='Failed'].{activity:activityName, error:error.message}" \
                --output table
              exit 1
            fi

            sleep 30
          done

          echo "❌ Validation pipeline timed out"
          exit 1

  # ===========================================================================
  # Stage 4: Deploy to Staging (release branches only)
  # ===========================================================================
  deploy-staging:
    name: Deploy to Staging
    needs: validate-dev
    if: startsWith(github.ref, 'refs/heads/release/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://adf.azure.com/en/home?factory=%2Fsubscriptions%2F${{ secrets.AZURE_SUBSCRIPTION_ID }}%2FresourceGroups%2Frg-bfretail-staging%2Fproviders%2FMicrosoft.DataFactory%2Ffactories%2Fadf-bfretail-staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy infrastructure to staging
        run: |
          az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP_STAGING }} \
            --template-file ADF-Migration/02-infrastructure/main.bicep \
            --parameters environment=staging prefix=bfretail \
            --name "adf-infra-staging-${{ github.run_number }}"

      - name: Deploy ADF artifacts to staging
        run: |
          echo "=== Deploying all ADF artifacts to staging ==="
          # Reuse the same deployment logic as dev (linked services → datasets → dataflows → pipelines → triggers)
          # In production, consider using ADF's native CI/CD with ARM export/import

          for file in ADF-Migration/03-extract-pipelines/linked-services/ls-*.json; do
            NAME=$(python3 -c "import json; print(json.load(open('$file'))['name'])")
            az datafactory linked-service create \
              --resource-group ${{ env.RESOURCE_GROUP_STAGING }} \
              --factory-name ${{ env.ADF_NAME_STAGING }} \
              --name "$NAME" \
              --properties @"$file" 2>/dev/null || true
          done

          for file in ADF-Migration/03-extract-pipelines/datasets/ds-*.json; do
            NAME=$(python3 -c "import json; print(json.load(open('$file'))['name'])")
            az datafactory dataset create \
              --resource-group ${{ env.RESOURCE_GROUP_STAGING }} \
              --factory-name ${{ env.ADF_NAME_STAGING }} \
              --name "$NAME" \
              --properties @"$file" 2>/dev/null || true
          done

          for file in ADF-Migration/04-transform-dataflows/dataflow-*.json; do
            NAME=$(python3 -c "import json; print(json.load(open('$file'))['name'])")
            az datafactory data-flow create \
              --resource-group ${{ env.RESOURCE_GROUP_STAGING }} \
              --factory-name ${{ env.ADF_NAME_STAGING }} \
              --name "$NAME" \
              --flow-type "MappingDataFlow" \
              --properties @"$file" 2>/dev/null || true
          done

          for dir in 03-extract-pipelines/pipelines 07-incremental-loads 06-orchestration 09-validation; do
            for file in ADF-Migration/$dir/pipeline-*.json; do
              [ -f "$file" ] || continue
              NAME=$(python3 -c "import json; print(json.load(open('$file'))['name'])")
              az datafactory pipeline create \
                --resource-group ${{ env.RESOURCE_GROUP_STAGING }} \
                --factory-name ${{ env.ADF_NAME_STAGING }} \
                --name "$NAME" \
                --pipeline @"$file" 2>/dev/null || true
            done
          done

  # ===========================================================================
  # Stage 5: Deploy to Production (manual approval required)
  # ===========================================================================
  deploy-prod:
    name: Deploy to Production
    needs: deploy-staging
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment:
      name: prod
      url: https://adf.azure.com/en/home?factory=%2Fsubscriptions%2F${{ secrets.AZURE_SUBSCRIPTION_ID }}%2FresourceGroups%2Frg-bfretail-prod%2Fproviders%2FMicrosoft.DataFactory%2Ffactories%2Fadf-bfretail-prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Pre-deployment snapshot
        run: |
          echo "=== Creating pre-deployment snapshot ==="
          az datafactory pipeline list \
            --resource-group ${{ env.RESOURCE_GROUP_PROD }} \
            --factory-name ${{ env.ADF_NAME_PROD }} \
            --query "[].{name:name}" --output json > /tmp/pre-deploy-pipelines.json
          echo "Snapshot saved: $(cat /tmp/pre-deploy-pipelines.json | python3 -c 'import json,sys; print(len(json.load(sys.stdin)))') pipelines"

      - name: Stop production triggers
        run: |
          TRIGGERS=$(az datafactory trigger list \
            --resource-group ${{ env.RESOURCE_GROUP_PROD }} \
            --factory-name ${{ env.ADF_NAME_PROD }} \
            --query "[?properties.runtimeState=='Started'].name" \
            --output tsv 2>/dev/null || true)

          for trigger in $TRIGGERS; do
            echo "Stopping trigger: $trigger"
            az datafactory trigger stop \
              --resource-group ${{ env.RESOURCE_GROUP_PROD }} \
              --factory-name ${{ env.ADF_NAME_PROD }} \
              --name "$trigger"
          done

          # Wait for any in-progress pipeline runs to complete
          echo "Waiting 60s for in-progress runs to complete..."
          sleep 60

      - name: Deploy infrastructure to production
        run: |
          az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP_PROD }} \
            --template-file ADF-Migration/02-infrastructure/main.bicep \
            --parameters environment=prod prefix=bfretail \
            --name "adf-infra-prod-${{ github.run_number }}"

      - name: Deploy ADF artifacts to production
        run: |
          for file in ADF-Migration/03-extract-pipelines/linked-services/ls-*.json; do
            NAME=$(python3 -c "import json; print(json.load(open('$file'))['name'])")
            az datafactory linked-service create \
              --resource-group ${{ env.RESOURCE_GROUP_PROD }} \
              --factory-name ${{ env.ADF_NAME_PROD }} \
              --name "$NAME" \
              --properties @"$file" 2>/dev/null || true
          done

          for file in ADF-Migration/03-extract-pipelines/datasets/ds-*.json; do
            NAME=$(python3 -c "import json; print(json.load(open('$file'))['name'])")
            az datafactory dataset create \
              --resource-group ${{ env.RESOURCE_GROUP_PROD }} \
              --factory-name ${{ env.ADF_NAME_PROD }} \
              --name "$NAME" \
              --properties @"$file" 2>/dev/null || true
          done

          for file in ADF-Migration/04-transform-dataflows/dataflow-*.json; do
            NAME=$(python3 -c "import json; print(json.load(open('$file'))['name'])")
            az datafactory data-flow create \
              --resource-group ${{ env.RESOURCE_GROUP_PROD }} \
              --factory-name ${{ env.ADF_NAME_PROD }} \
              --name "$NAME" \
              --flow-type "MappingDataFlow" \
              --properties @"$file" 2>/dev/null || true
          done

          for dir in 03-extract-pipelines/pipelines 07-incremental-loads 06-orchestration 09-validation; do
            for file in ADF-Migration/$dir/pipeline-*.json; do
              [ -f "$file" ] || continue
              NAME=$(python3 -c "import json; print(json.load(open('$file'))['name'])")
              az datafactory pipeline create \
                --resource-group ${{ env.RESOURCE_GROUP_PROD }} \
                --factory-name ${{ env.ADF_NAME_PROD }} \
                --name "$NAME" \
                --pipeline @"$file" 2>/dev/null || true
            done
          done

      - name: Start production triggers
        run: |
          for file in ADF-Migration/06-orchestration/trigger-*.json; do
            NAME=$(python3 -c "import json; print(json.load(open('$file'))['name'])")
            echo "Starting trigger: $NAME"
            az datafactory trigger start \
              --resource-group ${{ env.RESOURCE_GROUP_PROD }} \
              --factory-name ${{ env.ADF_NAME_PROD }} \
              --name "$NAME" || true
          done

      - name: Post-deployment smoke test
        run: |
          echo "=== Running post-deployment smoke test ==="
          RUN_ID=$(az datafactory pipeline create-run \
            --resource-group ${{ env.RESOURCE_GROUP_PROD }} \
            --factory-name ${{ env.ADF_NAME_PROD }} \
            --name "pipeline_validation" \
            --parameters '{"ValidationScope": "Smoke"}' \
            --query "runId" --output tsv)

          echo "Smoke test run ID: $RUN_ID"

          for i in $(seq 1 20); do
            STATUS=$(az datafactory pipeline-run show \
              --resource-group ${{ env.RESOURCE_GROUP_PROD }} \
              --factory-name ${{ env.ADF_NAME_PROD }} \
              --run-id "$RUN_ID" \
              --query "status" --output tsv)

            if [ "$STATUS" = "Succeeded" ]; then
              echo "✅ Production smoke test passed"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "❌ Production smoke test $STATUS — investigate immediately"
              exit 1
            fi
            sleep 30
          done
